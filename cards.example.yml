cards:
  # Each entry defines one tracked credit card.
  #
  # Fields:
  #   bank          - CITI, DBS, or UOB (determines which email parser is used)
  #   gmail_label   - the Gmail label suffix after [Gmail]/Labels/
  #   identifier    - substring that must appear in the alert email body to confirm
  #                   the right card. Use last 4 digits for UOB/DBS, card product
  #                   name for Citi. Omit (or leave blank) to accept all emails from
  #                   that bank's sender address.
  #   card_type     - label used throughout the app (caps logic, Telegram messages)
  #   online_bypass - true: skip merchant categorisation, record spend as ONLINE
  #                   false: categorise via MCC lookup / Claude fallback

  - bank: CITI
    gmail_label: Citibank
    identifier: "Citi Rewards"
    card_type: CITI_REWARDS
    online_bypass: true

  - bank: DBS
    gmail_label: iBank
    identifier: "1798"
    card_type: DBS_WWMC
    online_bypass: true

  - bank: UOB
    gmail_label: iBank
    identifier: "8631"
    card_type: UOB_LADY
    online_bypass: false
